<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #06C755;
            --bg: #0a0f0d; --surface: #111a14; --surface2: #172019;
            --border: rgba(6, 199, 85, 0.18); --text: #e8f5ec; --muted: #7a9e82;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        body::before {
            content: ''; position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(6,199,85,0.06) 0%, transparent 70%);
            top: -100px; left: 50%; transform: translateX(-50%); pointer-events: none;
        }

        #loading-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; z-index: 100; transition: opacity 0.4s;
        }
        #loading-screen.hide { opacity: 0; pointer-events: none; }
        .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: var(--muted); }

        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 40px 36px; width: 90%; max-width: 400px;
            position: relative; z-index: 1;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
            opacity: 0;
        }
        .card.visible { animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .card::before {
            content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }

        .success-badge {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(6,199,85,0.1); border: 1px solid rgba(6,199,85,0.25);
            border-radius: 99px; padding: 8px 18px; margin: 0 auto 28px; width: fit-content;
        }
        .check-icon { width: 20px; height: 20px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #000; font-weight: 700; }
        .success-badge span { font-size: 13px; font-weight: 600; color: var(--green); }

        .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
        .avatar-wrap { position: relative; width: 88px; height: 88px; margin-bottom: 14px; }
        .avatar-ring { position: absolute; inset: -3px; border-radius: 50%; background: conic-gradient(var(--green) 0deg, transparent 90deg, var(--green) 180deg, transparent 270deg, var(--green) 360deg); animation: spinRing 4s linear infinite; }
        @keyframes spinRing { to { transform: rotate(360deg); } }
        .avatar-ring-mask { position: absolute; inset: 1px; background: var(--surface); border-radius: 50%; }
        .avatar-img { position: relative; z-index: 2; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }
        .avatar-placeholder { position: relative; z-index: 2; width: 100%; height: 100%; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .display-name { font-size: 20px; font-weight: 700; color: var(--green); }

        .info-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
        .info-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
        .info-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(6,199,85,0.08); border: 1px solid rgba(6,199,85,0.15); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .info-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 3px; }
        .info-value { font-size: 13px; font-weight: 500; word-break: break-all; }
        .info-value.mono { font-family: monospace; font-size: 12px; color: var(--green); }
        .info-value.url  { font-size: 11px; color: var(--muted); font-family: monospace; }

        .btn-save {
            width: 100%; background: var(--green); color: #000; border: none;
            padding: 14px; font-size: 15px; font-weight: 700;
            font-family: 'Kanit', sans-serif; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s;
        }
        .btn-save:hover:not(:disabled) { background: #04a344; }
        .btn-save:disabled { background: #2a3a2f; color: var(--muted); cursor: not-allowed; }
        .btn-save .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn-save.loading .btn-spinner { display: block; }

        #toast {
            display: none; margin-top: 14px;
            border-radius: 12px; padding: 14px 16px;
            font-size: 14px; font-weight: 600; text-align: center;
        }
        #toast.success { background: rgba(6,199,85,0.12); border: 1px solid rgba(6,199,85,0.3); color: var(--green); }
        #toast.error   { background: rgba(255,80,80,0.1);  border: 1px solid rgba(255,80,80,0.3);  color: #ff6b6b; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">กำลังดึงข้อมูล LINE...</div>
</div>

<div class="card" id="main-card">
    <div class="success-badge">
        <div class="check-icon">✓</div>
        <span>Login สำเร็จแล้ว</span>
    </div>

    <div class="avatar-section">
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar-ring-mask"></div>
            <img class="avatar-img" id="avatar-img" src="" alt="avatar" />
            <div class="avatar-placeholder" id="avatar-placeholder">👤</div>
        </div>
        <div class="display-name" id="display-name">—</div>
    </div>

    <div class="info-list">
        <div class="info-row">
            <div class="info-icon">🏷</div>
            <div>
                <div class="info-label">display_name</div>
                <div class="info-value" id="val-display-name">—</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon">🔑</div>
            <div>
                <div class="info-label">user_id</div>
                <div class="info-value mono" id="val-user-id">—</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon">🖼</div>
            <div style="min-width:0;flex:1;">
                <div class="info-label">picture_url</div>
                <div class="info-value url" id="val-picture-url">—</div>
            </div>
        </div>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveToDb()">
        <div class="btn-spinner"></div>
        <span id="saveText">💾 เก็บลงฐานข้อมูล</span>
    </button>

    <div id="toast"></div>
</div>

<script>
    const CONFIG = {
        LIFF_ID: "2009659582-Yhx9Jeyc",
        API_URL: "http://localhost:8000/line/register"
    };

    let lineProfile = null;

    window.addEventListener('load', async () => {
        try {
            await liff.init({ liffId: CONFIG.LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login({ redirectUri: window.location.href });
                return;
            }

            lineProfile = await liff.getProfile();

            // Avatar
            if (lineProfile.pictureUrl) {
                const img = document.getElementById('avatar-img');
                img.src = lineProfile.pictureUrl;
                img.style.display = 'block';
                img.onload = () => document.getElementById('avatar-placeholder').style.display = 'none';
            }

            // Fill fields
            document.getElementById('display-name').textContent     = lineProfile.displayName || '—';
            document.getElementById('val-display-name').textContent = lineProfile.displayName || '—';
            document.getElementById('val-user-id').textContent      = lineProfile.userId      || '—';
            document.getElementById('val-picture-url').textContent  = lineProfile.pictureUrl  || '(ไม่มีรูป)';

            // Show card
            document.getElementById('loading-screen').classList.add('hide');
            document.getElementById('main-card').classList.add('visible');

        } catch (err) {
            document.querySelector('.loading-text').textContent = 'Error: ' + err.message;
        }
    });

    async function saveToDb() {
        if (!lineProfile) return;

        const btn   = document.getElementById('saveBtn');
        const toast = document.getElementById('toast');

        btn.disabled = true;
        btn.classList.add('loading');
        document.getElementById('saveText').textContent = 'กำลังบันทึก...';
        toast.style.display = 'none';

        try {
            const response = await fetch(CONFIG.API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id:      lineProfile.userId,
                    display_name: lineProfile.displayName,
                    picture_url:  lineProfile.pictureUrl || null
                })
            });

            const data = await response.json().catch(() => ({}));

            if (response.ok) {
                toast.className = 'success';
                toast.textContent = '✅ เก็บข้อมูลลงฐานข้อมูลสำเร็จ!';
                toast.style.display = 'block';
                document.getElementById('saveText').textContent = '✓ บันทึกแล้ว';
            } else {
                const errMsg = data.detail || data.message || `HTTP ${response.status}`;
                toast.className = 'error';
                toast.textContent = `❌ บันทึกไม่สำเร็จ: ${errMsg}`;
                toast.style.display = 'block';
                btn.disabled = false;
                document.getElementById('saveText').textContent = '💾 เก็บลงฐานข้อมูล';
            }

        } catch (err) {
            toast.className = 'error';
            toast.textContent = `❌ เกิดข้อผิดพลาด: ${err.message}`;
            toast.style.display = 'block';
            btn.disabled = false;
            document.getElementById('saveText').textContent = '💾 เก็บลงฐานข้อมูล';
        } finally {
            btn.classList.remove('loading');
        }
    }
</script>
</body>
</html>
