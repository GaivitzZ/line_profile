<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE Register</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body {
            font-family: sans-serif;
            background: #0f1a13;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #16241b;
            padding: 30px;
            border-radius: 16px;
            width: 350px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-line { background: #06C755; }
        .btn-manual { background: #333; color: white; }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
        }

        #manual-form { display: none; }
        #loading { display: none; text-align: center; }
    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <!-- LOADING -->
    <div id="loading">กำลังโหลด...</div>

    <!-- LINE BUTTON -->
    <button id="btn-line" class="btn-line" onclick="loginWithLine()">
        Login with LINE
    </button>

    <!-- MANUAL FORM -->
    <div id="manual-form">
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button class="btn-manual" onclick="manualLogin()">
            Login Manual
        </button>
    </div>
</div>

<script>
const CONFIG = {
    LIFF_ID: "2009659582-Yhx9Jeyc",
    API_LINE: "https://changable-clarita-hardheadedly.ngrok-free.dev/line/register",
    API_MANUAL: "https://changable-clarita-hardheadedly.ngrok-free.dev/line/manual-login",
    PROFILE_PAGE: "Profile.html"
};

let liffReady = false;

// ================= INIT =================
window.onload = async () => {
    try {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        liffReady = true;

        // ❗ เช็คว่าเปิดใน LINE หรือไม่
        if (!liff.isInClient()) {
            showManual();
            return;
        }

        // ✅ อยู่ใน LINE
        if (liff.isLoggedIn()) {
            showLoading();
            processLine();
        }

    } catch (e) {
        console.error(e);
        showManual();
    }
};

// ================= UI =================
function showManual() {
    document.getElementById("btn-line").style.display = "none";
    document.getElementById("manual-form").style.display = "block";
}

function showLoading() {
    document.getElementById("btn-line").style.display = "none";
    document.getElementById("manual-form").style.display = "none";
    document.getElementById("loading").style.display = "block";
}

// ================= LINE LOGIN =================
async function loginWithLine() {
    if (!liffReady) return alert("LIFF not ready");

    if (!liff.isInClient()) {
        alert("กรุณาเปิดผ่าน LINE");
        showManual();
        return;
    }

    showLoading();

    if (!liff.isLoggedIn()) {
        liff.login();
    } else {
        processLine();
    }
}

async function processLine() {
    try {
        const profile = await liff.getProfile();

        const payload = {
            line_user_id: profile.userId,
            display_name: profile.displayName,
            picture_url: profile.pictureUrl,
            login_method: "liff"
        };

        const res = await fetch(CONFIG.API_LINE, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            window.location.href = CONFIG.PROFILE_PAGE;
        } else {
            alert("save error");
        }

    } catch (e) {
        console.error(e);
        showManual();
    }
}

// ================= MANUAL LOGIN =================
async function manualLogin() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!username || !password) {
        alert("กรอกข้อมูลให้ครบ");
        return;
    }

    try {
        const res = await fetch(CONFIG.API_MANUAL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.line_user_id) {
            sessionStorage.setItem("line_profile", JSON.stringify(data));
            window.location.href = CONFIG.PROFILE_PAGE;
        } else {
            alert("login fail");
        }

    } catch (e) {
        console.error(e);
        alert("error");
    }
}
</script>

</body>
</html>
