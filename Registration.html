<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียน LINE</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #06C755; --green-dark: #04a344; --green-glow: rgba(6, 199, 85, 0.35);
            --bg: #0a0f0d; --surface: #111a14; --surface2: #172019;
            --border: rgba(6, 199, 85, 0.18); --text: #e8f5ec; --muted: #7a9e82;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(6,199,85,0.06) 0%, transparent 70%);
            top: -100px; left: 50%; transform: translateX(-50%); pointer-events: none;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 44px 36px; width: 90%; max-width: 400px; position: relative; z-index: 1;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5); animation: slideUp 0.5s ease both;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .logo-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
        .logo-icon { width: 36px; height: 36px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        h1 span { color: var(--green); }
        .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
        .steps { display: flex; align-items: center; margin-bottom: 28px; }
        .step { display: flex; align-items: center; gap: 8px; flex: 1; }
        .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--muted); }
        .step.active .step-num { background: var(--green); color: #000; border-color: var(--green); }
        .step-label { font-size: 11px; color: var(--muted); }
        .step.active .step-label { color: var(--green); }
        .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 6px; }
        .btn-line {
            width: 100%; background: var(--green); color: #000; border: none; padding: 16px 24px;
            font-size: 16px; font-weight: 700; border-radius: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .btn-line:hover { background: var(--green-dark); box-shadow: 0 0 15px var(--green-glow); }
        .btn-line:disabled { background: #2a3a2f; color: var(--muted); cursor: not-allowed; }
        #auto-loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
        #auto-loading.show { display: flex; }
        .auto-spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-wrap">
        <div class="logo-icon">💬</div>
        <div style="font-size: 13px; font-weight: 500; color: var(--muted);">LINE REGISTRATION</div>
    </div>

    <h1>ลงทะเบียน<br><span>ด้วยบัญชี LINE</span></h1>
    <p class="subtitle">กรุณากดปุ่มเพื่อเข้าสู่ระบบและยืนยันตัวตน</p>

    <div class="steps">
        <div class="step active"><div class="step-num">1</div><div class="step-label">Login</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">2</div><div class="step-label">Save</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div><div class="step-label">Profile</div></div>
    </div>

    <div id="auto-loading">
        <div class="auto-spinner"></div>
        <div id="loading-text" style="font-size: 14px; color: var(--muted);">กำลังประมวลผล...</div>
    </div>

    <button class="btn-line" id="registerBtn" onclick="handleLogin()">
        <span class="btn-text">เข้าสู่ระบบด้วย LINE</span>
    </button>
</div>

<script>
    const CONFIG = {
        LIFF_ID: "2009659582-Yhx9Jeyc", 
        API_URL: "https://changable-clarita-hardheadedly.ngrok-free.dev/line/register",
        PROFILE_PAGE: "Profile.html"
    };

    // 1. Initialize LIFF อย่างเดียว ไม่สั่ง Login อัตโนมัติ
    window.addEventListener('load', async () => {
        try {
            await liff.init({ liffId: CONFIG.LIFF_ID });
            
            // ถ้า Browser มี session ค้างอยู่แล้วและยังไม่ได้บันทึกข้อมูล (Register) 
            // จะข้ามไปขั้นตอนบันทึกข้อมูลเลย หรือจะให้กดใหม่ก็ได้
            if (liff.isLoggedIn()) {
                console.log("Logged in already");
            }
        } catch (err) { 
            console.error("LIFF Init Error:", err); 
        }
    });

    // 2. ฟังก์ชันเมื่อกดปุ่ม (Manual Login)
    async function handleLogin() {
        if (!liff.isLoggedIn()) {
            // สั่ง Login โดยไม่ใช้ Login อัตโนมัติ 
            // ผู้ใช้จะเจอหน้ากรอก Email/Password หรือเลือกกดปุ่ม Login ด้วยแอป LINE
            liff.login(); 
        } else {
            // ถ้าล็อกอินค้างไว้แล้ว ให้เริ่มกระบวนการลงทะเบียน
            startRegistration();
        }
    }

    // แยกส่วนการดึง Profile และส่ง API
    async function startRegistration() {
        const btn = document.getElementById('registerBtn');
        const loading = document.getElementById('auto-loading');
        
        btn.style.display = 'none';
        loading.classList.add('show');

        try {
            const profile = await liff.getProfile();
            const payload = {
                line_user_id: profile.userId,
                display_name: profile.displayName,
                picture_url: profile.pictureUrl || null
            };

            const response = await fetch(CONFIG.API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                sessionStorage.setItem('line_profile', JSON.stringify({
                    user_id: profile.userId,
                    display_name: profile.displayName,
                    picture_url: profile.pictureUrl || ''
                }));
                window.location.href = CONFIG.PROFILE_PAGE;
            } else {
                throw new Error('บันทึกข้อมูลไม่สำเร็จ');
            }
        } catch (err) { 
            alert(err.message);
            btn.style.display = 'flex';
            loading.classList.remove('show');
        }
    }

    // ตรวจสอบหลังจาก Redirect กลับมาจากหน้า Login ของ LINE
    window.addEventListener('load', () => {
        // ตรวจสอบว่าพึ่งกลับมาจากการ Login สำเร็จหรือไม่
        const urlParams = new URLSearchParams(window.location.search);
        if (liff.isLoggedIn()) {
             // ถ้าล็อกอินแล้ว ให้รันบันทึกข้อมูลเลย (เพราะผู้ใช้กด Login มาแล้ว)
             startRegistration();
        }
    });
</script>
</body>
</html>
