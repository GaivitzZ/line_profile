<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน LINE</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #06C755; --bg: #0a0f0d; --surface: #111a14; --text: #e8f5ec; --muted: #7a9e82; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: var(--surface); border: 1px solid rgba(6,199,85,0.2); border-radius: 24px; padding: 40px; width: 90%; max-width: 400px; text-align: center; }
        h1 span { color: var(--green); }
        .btn-line { width: 100%; background: var(--green); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        #loading { display: none; margin: 20px 0; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(6,199,85,0.2); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>ลงทะเบียน<br><span>ด้วย LINE</span></h1>
        <p style="color: var(--muted); margin: 15px 0;">เชื่อมต่อโปรไฟล์เพื่อเริ่มใช้งาน</p>
        
        <div id="loading">
            <div class="spinner"></div>
            <p style="font-size: 12px; margin-top: 10px;">กำลังดำเนินการ...</p>
        </div>

        <button class="btn-line" id="regBtn" onclick="startLiff()">เชื่อมต่อ LINE Profile</button>
        <button id="manualBtn" style="display:none; background:none; border:none; color:var(--muted); margin-top:15px; cursor:pointer; text-decoration:underline;" onclick="window.location.href='Login.html'">ใช้ Email/Password แทน</button>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2009659582-Yhx9Jeyc",
            API_URL: "http://localhost:8000/api/line/register"
        };

        async function startLiff() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('regBtn').style.display = 'none';

            try {
                await liff.init({ liffId: CONFIG.LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    await sendToApi(profile);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('manualBtn').style.display = 'block';
                alert("LIFF ไม่ทำงาน: กำลังเปิดโหมดกรอกข้อมูลเอง");
            }
        }

        async function sendToApi(profile) {
            const res = await fetch(CONFIG.API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    line_user_id: profile.userId,
                    display_name: profile.displayName,
                    picture_url: profile.pictureUrl
                })
            });

            if (res.ok) {
                sessionStorage.setItem('line_profile', JSON.stringify({
                    display_name: profile.displayName,
                    picture_url: profile.pictureUrl,
                    user_id: profile.userId
                }));
                window.location.href = 'Profile.html';
            }
        }
    </script>
</body>
</html>
