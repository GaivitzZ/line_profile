<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียน LINE</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #06C755; --green-dark: #04a344; --green-glow: rgba(6, 199, 85, 0.35);
            --bg: #0a0f0d; --surface: #111a14; --surface2: #172019;
            --border: rgba(6, 199, 85, 0.18); --text: #e8f5ec; --muted: #7a9e82;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(6,199,85,0.06) 0%, transparent 70%);
            top: -100px; left: 50%; transform: translateX(-50%); pointer-events: none;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 44px 36px; width: 90%; max-width: 420px; position: relative; z-index: 1;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5); animation: slideUp 0.5s ease both;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .logo-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
        .logo-icon { width: 36px; height: 36px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        h1 span { color: var(--green); }
        .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

        .steps { display: flex; align-items: center; margin-bottom: 28px; }
        .step { display: flex; align-items: center; gap: 8px; flex: 1; }
        .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--muted); }
        .step.active .step-num { background: var(--green); color: #000; border-color: var(--green); }
        .step-label { font-size: 11px; color: var(--muted); }
        .step.active .step-label { color: var(--green); }
        .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 6px; }

        .btn-line {
            width: 100%; background: var(--green); color: #000; border: none; padding: 16px 24px;
            font-size: 16px; font-weight: 700; border-radius: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-line:disabled { background: #2a3a2f; color: var(--muted); }

        #auto-loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
        #auto-loading.show { display: flex; }
        .auto-spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ส่วนฟอร์ม manual login */
        #manual-form { display: none; margin-top: 20px; }
        #manual-form.show { display: block; }
        input {
            width: 100%; padding: 14px 16px; margin-bottom: 12px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--surface2); color: var(--text);
            font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--green); }
        .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; display: none; }
        #debug-log { margin-top: 20px; font-size: 11px; color: var(--muted); background: var(--surface2); padding: 12px; border-radius: 10px; max-height: 100px; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-wrap">
        <div class="logo-icon">💬</div>
        <div style="font-size: 13px; font-weight: 500; color: var(--muted);">LINE REGISTRATION</div>
    </div>

    <h1>ลงทะเบียน<br><span>ด้วย LINE</span></h1>
    <p class="subtitle">เชื่อมต่อบัญชีเพื่อยืนยันตัวตน</p>

    <div class="steps">
        <div class="step active"><div class="step-num">1</div><div class="step-label">Login</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">2</div><div class="step-label">Save</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div><div class="step-label">Profile</div></div>
    </div>

    <!-- Auto loading (LIFF) -->
    <div id="auto-loading">
        <div class="auto-spinner"></div>
        <div style="font-size: 14px; color: var(--muted);">กำลังเชื่อมต่อ LINE อัตโนมัติ...</div>
    </div>

    <!-- ปุ่ม LIFF -->
    <button class="btn-line" id="registerBtn" onclick="tryLiffLogin()">
        <span class="btn-text">เชื่อมต่อด้วย LINE (อัตโนมัติ)</span>
    </button>

    <!-- ฟอร์ม Manual Login -->
    <div id="manual-form">
        <p style="font-size: 14px; color: var(--muted); margin: 24px 0 16px;">หรือเข้าสู่ระบบด้วย Username และ Password ที่ผูกกับ LINE</p>
        
        <input type="text" id="username" placeholder="Username หรือ Email ที่ผูกกับ LINE" autocomplete="username">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        
        <div class="error" id="login-error">Username หรือ Password ไม่ถูกต้อง</div>
        
        <button class="btn-line" onclick="manualLineLogin()" style="margin-top: 12px;">
            เข้าสู่ระบบด้วย Username / Password
        </button>
    </div>

    <div id="debug-log"></div>
</div>

<script>
    const CONFIG = {
        LIFF_ID: "2009659582-Yhx9Jeyc",
        API_URL: "https://changable-clarita-hardheadedly.ngrok-free.dev/line/register",
        PROFILE_PAGE: "Profile.html"
    };

    let liffInitialized = false;

    function logDebug(msg) {
        const debug = document.getElementById('debug-log');
        debug.style.display = 'block';
        debug.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        debug.scrollTop = debug.scrollHeight;
    }

    // ฟังก์ชันหลักเมื่อโหลดหน้า
    window.addEventListener('load', async () => {
        logDebug('เริ่มต้นโหลดหน้า...');
        
        try {
            await liff.init({ liffId: CONFIG.LIFF_ID });
            liffInitialized = true;
            logDebug('LIFF init สำเร็จ');

            if (liff.isLoggedIn()) {
                logDebug('ผู้ใช้ล็อกอินด้วย LIFF อยู่แล้ว → ดำเนินการลงทะเบียนอัตโนมัติ');
                document.getElementById('registerBtn').style.display = 'none';
                document.getElementById('auto-loading').classList.add('show');
                await processLiffProfile();
            } else {
                logDebug('ยังไม่ได้ล็อกอินด้วย LIFF → แสดงปุ่มเชื่อมต่อ');
                // แสดงปุ่ม LIFF (default)
            }
        } catch (err) {
            logDebug('LIFF init ล้มเหลว: ' + err.message);
            console.error(err);
            // ถ้า LIFF ล้มเหลว → แสดงฟอร์ม manual ทันที
            showManualForm();
        }
    });

    // พยายามล็อกอินด้วย LIFF
    async function tryLiffLogin() {
        if (!liffInitialized) {
            alert('LIFF ยังไม่ได้ initialize กรุณารีเฟรชหน้า');
            return;
        }

        document.getElementById('registerBtn').style.display = 'none';
        document.getElementById('auto-loading').classList.add('show');

        if (!liff.isLoggedIn()) {
            try {
                await liff.login();   // จะเปิดหน้าล็อกอิน LINE
                // หลังจาก login สำเร็จ จะ redirect กลับมาแล้ว isLoggedIn() จะเป็น true
            } catch (err) {
                logDebug('LIFF login ล้มเหลว: ' + err.message);
                showManualForm();
            }
        } else {
            await processLiffProfile();
        }
    }

    // ดึงโปรไฟล์จาก LIFF แล้วส่งไป backend
    async function processLiffProfile() {
        try {
            const profile = await liff.getProfile();
            logDebug('ได้โปรไฟล์จาก LIFF: ' + profile.displayName);

            await sendToBackend({
                line_user_id: profile.userId,
                display_name: profile.displayName,
                picture_url: profile.pictureUrl || null,
                login_method: 'liff'
            });
        } catch (err) {
            logDebug('ไม่สามารถดึงโปรไฟล์จาก LIFF ได้');
            showManualForm();
        }
    }

    // แสดงฟอร์ม manual
    function showManualForm() {
        document.getElementById('auto-loading').classList.remove('show');
        document.getElementById('registerBtn').style.display = 'none';
        document.getElementById('manual-form').classList.add('show');
        logDebug('แสดงฟอร์มเข้าสู่ระบบแบบ manual');
    }

    // ล็อกอินแบบ manual ด้วย username + password (LINE Login)
    async function manualLineLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorEl = document.getElementById('login-error');

        if (!username || !password) {
            errorEl.textContent = 'กรุณากรอก Username และ Password';
            errorEl.style.display = 'block';
            return;
        }

        errorEl.style.display = 'none';
        document.querySelector('#manual-form button').disabled = true;
        document.querySelector('#manual-form button').textContent = 'กำลังตรวจสอบ...';

        try {
            // TODO: คุณต้องสร้าง endpoint นี้ที่ backend เอง
            // เช่น https://your-api.com/line/manual-login
            const response = await fetch('https://changable-clarita-hardheadedly.ngrok-free.dev/line/manual-login', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (response.ok && result.line_user_id) {
                // สำเร็จ → เก็บข้อมูลแล้วไปหน้า Profile
                sessionStorage.setItem('line_profile', JSON.stringify({
                    user_id: result.line_user_id,
                    display_name: result.display_name || username,
                    picture_url: result.picture_url || ''
                }));
                window.location.href = CONFIG.PROFILE_PAGE;
            } else {
                errorEl.textContent = result.message || 'Username หรือ Password ไม่ถูกต้อง';
                errorEl.style.display = 'block';
            }
        } catch (err) {
            errorEl.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่';
            errorEl.style.display = 'block';
            console.error(err);
        } finally {
            document.querySelector('#manual-form button').disabled = false;
            document.querySelector('#manual-form button').textContent = 'เข้าสู่ระบบด้วย Username / Password';
        }
    }

    // ฟังก์ชันส่งข้อมูลไป backend (ใช้ร่วมกันทั้ง LIFF และ Manual)
    async function sendToBackend(payload) {
        try {
            const response = await fetch(CONFIG.API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                window.location.href = CONFIG.PROFILE_PAGE;
            } else {
                alert('บันทึกข้อมูลไม่สำเร็จ กรุณาลองใหม่');
            }
        } catch (err) {
            alert('เกิดข้อผิดพลาด: ' + err.message);
        }
    }
</script>
</body>
</html>
